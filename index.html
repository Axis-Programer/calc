<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.index.css">
</head>
<body>
    <div id="calculator">
        <input id="display" readonly>
        <div id="keys">
            
            <button class="operator-btn-cie" ><a href="https://github.com/aziz-chniti/weather-app/blob/master/img/search.png">Cie.</a></button>
            
            <button onclick="appendToDisplay('(')" class="operator-btn">(</button>
            <button onclick="appendToDisplay(')')" class="operator-btn">)</button>
            <button onclick="appendToDisplay('+')" class="operator-btn">+</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            
            <button onclick="appendToDisplay('-')" class="operator-btn"><!--&mdash; or-->-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
           
            <button onclick="appendToDisplay('*')" class="operator-btn">x</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            
            <button onclick="appendToDisplay('/')" class="operator-btn">÷</button>
            <button onclick="appendToDisplay('0')">0</button>
            
            <button onclick="appendToDisplay(',')">,</button>
            
            <button onclick="calculate()">=</button>
            
            <button onclick="clearDisplay()" class="operator-btn-ac">AC</button>
    </div>

    <style>

    </style>

    <script src="js/script.index.js">

    </script>
</body>
</html>
